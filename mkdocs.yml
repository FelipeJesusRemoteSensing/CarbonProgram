site_name: Documentação - Monitoramento de Carbono
site_author: Felipe Jesus
site_url: 'https://FelipeJesusRemoteSensing.github.io/CarbonProgram/'
repo_url: 'https://github.com/FelipeJesusRemoteSensing/CarbonProgram'
repo_name: 'CarbonProgram'

theme:
  name: material
  logo: base_dados/images/Sensoriamento_Remoto_e_Geoprocessamento_-_branca.png
  language: pt-BR
  palette:
    - scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/weather-night
        name: Mudar para modo escuro
    - scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Mudar para modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

markdown_extensions:
  - attr_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

nav:
  - 'Início': 'index.md'
  - 'Contexto': 'mds/contexto.md'
  - 'Referenciais Teóricos': 'mds/referencias_conceituais.md'
  - 'Requisitos para Modelagem': 'mds/requisitos_para_modelagem.md'
  - 'Processamento e Scripts': 'mds/scripts.md'
  - 'Referências Bibliográficas': 'mds/referencias.md'